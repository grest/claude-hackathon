services:
  postgres:
    image: postgres:16-alpine
    container_name: churn_engine_postgres
    environment:
      POSTGRES_USER: churn
      POSTGRES_PASSWORD: churn_secret
      POSTGRES_DB: churn_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U churn -d churn_engine"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
